version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: v-validator-backend:latest
    container_name: backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    networks:
      - v-assure-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: v-validator-frontend:latest
    container_name: frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - v-assure-network

networks:
  v-assure-network:
    driver: bridge
